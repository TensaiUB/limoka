name: CI Pipeline

on:
  schedule:
    - cron: "0 0 * * *"
  pull_request:
    branches:
      - main
    types: [closed]
  workflow_dispatch:

env:
  BRANCH_NAME: "update-submodules_${{ github.sha }}"
  REPO_URL: "${{ vars.LIMOKA_GIT_REMOTE || 'github.com/TensaiUB/limoka.git' }}"
  COMMIT_BASE_URL: "${{ vars.LIMOKA_COMMIT_BASE_URL || 'https://github.com/TensaiUB/limoka' }}"
  GIT_DEPTH: 0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── schedule / workflow_dispatch ───────────────────────────────────────────

  before:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ env.GIT_DEPTH }}
          token: ${{ secrets.GH_TOKEN }}
      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
      - name: Create update branch
        run: |
          git fetch origin
          git checkout main
          git reset --hard origin/main
          git push origin --delete ${BRANCH_NAME} || true
          git checkout -b ${BRANCH_NAME}
          git push origin ${BRANCH_NAME} --force

  update:
    runs-on: ubuntu-latest
    needs: before
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ env.GIT_DEPTH }}
          ref: ${{ env.BRANCH_NAME }}
          token: ${{ secrets.GH_TOKEN }}
      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config core.fileMode false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: Clone and update repositories
        run: |
          python3 clone_repos.py
          git add .
          git commit -m "Update repositories $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push origin ${{ env.BRANCH_NAME }} --force

  # ── schedule / dispatch / merged PR ───────────────────────────────────────

  parse:
    runs-on: ubuntu-latest
    needs: [update]
    if: |
      always() && (
        needs.update.result == 'success' ||
        (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true)
      )
    steps:
      - name: Resolve checkout ref
        id: ref
        run: |
          if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ env.BRANCH_NAME }}" >> $GITHUB_OUTPUT
          else
            echo "value=main" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ env.GIT_DEPTH }}
          ref: ${{ steps.ref.outputs.value }}
          token: ${{ secrets.GH_TOKEN }}
      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config core.fileMode false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Parse modules
        env:
          LIMOKA_GITHUB_OWNER: ${{ vars.LIMOKA_GITHUB_OWNER || 'TensaiUB' }}
          LIMOKA_GITHUB_REPO_NAME: ${{ vars.LIMOKA_GITHUB_REPO_NAME || 'limoka' }}
        run: |
          git fetch origin
          git reset --hard origin/${{ steps.ref.outputs.value }}
          python3 parse.py
          git add modules.json diffs/
          git commit -m "Update modules.json and diffs $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push origin ${{ steps.ref.outputs.value }}

  # ── schedule / workflow_dispatch only ─────────────────────────────────────

  commit:
    runs-on: ubuntu-latest
    needs: [parse]
    if: |
      always() &&
      needs.parse.result == 'success' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ env.GIT_DEPTH }}
          ref: ${{ env.BRANCH_NAME }}
          token: ${{ secrets.GH_TOKEN }}
      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config core.fileMode false
      - name: Final commit
        run: |
          git add . || true
          git commit -m "Final commit $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push origin ${{ env.BRANCH_NAME }} --force

  create_pr:
    runs-on: ubuntu-latest
    needs: [commit]
    if: |
      always() &&
      needs.commit.result == 'success' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ env.GIT_DEPTH }}
          token: ${{ secrets.GH_TOKEN }}
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git fetch origin
          if git ls-remote --exit-code --heads origin ${{ env.BRANCH_NAME }} >/dev/null 2>&1; then
            gh pr create \
              --base main \
              --head ${{ env.BRANCH_NAME }} \
              --title "Update repositories $(date +'%Y-%m-%d %H:%M:%S')" \
              --body "Automated PR for repository updates" \
              || echo "PR creation failed (may already exist)"
          else
            echo "Branch not found, skipping PR creation"
          fi

  # ── merged PR only ─────────────────────────────────────────────────────────

  notify_diffs:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install aiohttp
      - name: Send module diffs to forum topic
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID_UPDATE }}
          TELEGRAM_TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID_UPDATE }}
          LIMOKA_GITHUB_OWNER: ${{ vars.LIMOKA_GITHUB_OWNER || 'TensaiUB' }}
          LIMOKA_GITHUB_REPO_NAME: ${{ vars.LIMOKA_GITHUB_REPO_NAME || 'limoka' }}
        run: |
          TOPIC_ARG=""
          [ -n "$TELEGRAM_TOPIC_ID" ] && TOPIC_ARG="--topic_id $TELEGRAM_TOPIC_ID"
          python3 update_diffs.py \
            --token "$TELEGRAM_BOT_TOKEN" \
            --chat_id "$TELEGRAM_CHAT_ID" \
            --base_commit HEAD~1 \
            $TOPIC_ARG

  # ── schedule / workflow_dispatch only ─────────────────────────────────────

  backup:
    runs-on: ubuntu-latest
    needs: [parse]
    if: |
      always() &&
      needs.parse.result == 'success' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ env.GIT_DEPTH }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install aiohttp
      - name: Run backup
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LIMOKA_GITHUB_OWNER: ${{ vars.LIMOKA_GITHUB_OWNER || 'TensaiUB' }}
          LIMOKA_GITHUB_REPO_NAME: ${{ vars.LIMOKA_GITHUB_REPO_NAME || 'limoka' }}
        run: |
          python3 backup.py \
            --token "$TELEGRAM_BOT_TOKEN" \
            --chat_id "$TELEGRAM_CHAT_ID"
